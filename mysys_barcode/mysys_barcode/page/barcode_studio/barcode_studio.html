<div class="bs-toolbar-shell">
	<div class="bs-toolbar-row">
		<div class="bs-toolbar-cluster bs-template-cluster">
			<div class="hide">
				<input id="bs-dt" class="form-control form-control-sm" value="{{ doctype || "" }}"/>
				<input id="bs-name" class="form-control form-control-sm" placeholder="NAME" value="{{ docname || "" }}"/>
			</div>
			<select id="bs-template" class="form-control form-control-sm bs-template-select"></select>
			<button id="bs-reload" class="btn btn-light btn-sm">Reload</button>
			<button id="bs-save" class="btn btn-secondary btn-sm">Save</button>
		</div>

		<div class="bs-toolbar-cluster">
			<div class="bs-toolbar-label">Insert</div>
			<button id="bs-add-text" class="btn btn-light btn-sm">+ Text</button>
			<button id="bs-add-barcode" class="btn btn-light btn-sm">+ Barcode</button>
			<button id="bs-clear" class="btn btn-warning btn-sm">Clear</button>
		</div>

		<div class="bs-toolbar-cluster bs-zoom-cluster">
			<div class="bs-toolbar-label">Zoom</div>
			<button id="bs-zoom-out" class="btn btn-light btn-sm">−</button>
			<input id="bs-zoom" type="range" min="10" max="400" value="100"/>
			<button id="bs-zoom-in" class="btn btn-light btn-sm">+</button>
			<button id="bs-zoom-reset" class="btn btn-light btn-sm" title="100%">Reset</button>
			<span id="bs-zoom-label" class="bs-zoom-value">100%</span>
		</div>
	</div>

	<div class="bs-toolbar-row">
		<div class="bs-toolbar-cluster">
			<div class="bs-toolbar-label">Guides</div>
			<button id="bs-toggle-grid" class="btn btn-light btn-sm" title="Grid">Grid</button>
			<select id="bs-snap" class="form-control form-control-sm bs-snap-select" title="Snap (mm)">
				<option value="0.5">0.5mm</option>
				<option value="1" selected>1mm</option>
				<option value="2">2mm</option>
				<option value="5">5mm</option>
			</select>
			<button id="bs-fullscreen" class="btn btn-light btn-sm" title="Fullscreen">⛶</button>
			<button id="bs-dark" class="btn btn-light btn-sm" title="Dark/Light">🌙</button>
		</div>

		<div class="bs-toolbar-cluster bs-sticker-cluster">
			<div class="bs-toolbar-label">Sticker</div>
			<input id="bs-w" type="number" class="form-control form-control-sm" value="{{ width_mm || 50 }}"/>
			<span class="bs-dim-sep">×</span>
			<input id="bs-h" type="number" class="form-control form-control-sm" value="{{ height_mm || 30 }}"/>
			<select id="bs-unit" class="form-control form-control-sm" title="Measurement unit">
				<option value="mm" selected>mm</option>
				<option value="in">in</option>
			</select>
			<button id="bs-apply" class="btn btn-primary btn-sm">Apply</button>
		</div>

		<div class="bs-toolbar-cluster bs-print-cluster">
			<div class="bs-toolbar-label">Print</div>
			<select id="bs-output" class="form-control form-control-sm">
				<option value="html" selected>HTML (Vector)</option>
				<option value="image">Image (HiDPI)</option>
			</select>
			<select id="bs-dpi" class="form-control form-control-sm" title="Image DPI">
				<option value="300" selected>300 DPI</option>
				<option value="600">600 DPI</option>
				<option value="96">96 DPI</option>
			</select>
			<input id="bs-copies" type="number" min="1" class="form-control form-control-sm" placeholder="Copies"/>
			<button id="bs-print" class="btn btn-primary btn-sm">Print</button>
		</div>
	</div>
</div>

<div class="bs-layout">
	<div class="bs-side bs-panel-fields">
		<div class="bs-collapsible" id="bs-fields-box">
			<div class="head">
				<div class="font-weight-bold">Fields</div>
				<div class="bs-panel-actions">
					<input id="bs-field-search" class="form-control form-control-sm" placeholder="Search fields..."/>
					<button class="btn btn-xs btn-light" id="bs-fields-collapse-toggle" title="Collapse/Expand All">Collapse All</button>
					<button class="btn btn-xs btn-light" id="bs-toggle-fields">Hide</button>
				</div>
			</div>
			<div class="body">
				<div id="bs-fields" class="small bs-fields-list"></div>
			</div>
		</div>
	</div>

	<div class="bs-center">
		<div class="bs-center-toolbar">
			<div class="bs-groups">
				<div class="bs-group">
					<div class="bs-group-title">Align</div>
					<div class="bs-group-body">
						<button class="btn btn-light btn-sm" data-align="left" title="Align Left">⟸</button>
						<button class="btn btn-light btn-sm" data-align="center" title="Align Center">↔</button>
						<button class="btn btn-light btn-sm" data-align="right" title="Align Right">⟹</button>
						<button class="btn btn-light btn-sm" data-align="top" title="Align Top">⟰</button>
						<button class="btn btn-light btn-sm" data-align="middle" title="Align Middle">↕</button>
						<button class="btn btn-light btn-sm" data-align="bottom" title="Align Bottom">⟱</button>
					</div>
				</div>

				<div class="bs-group">
					<div class="bs-group-title">Text</div>
					<div class="bs-group-body" id="text-style-group">
						<button class="btn btn-outline-secondary btn-sm" data-textalign="left" title="Text Left">L</button>
						<button class="btn btn-outline-secondary btn-sm" data-textalign="center" title="Text Center">C</button>
						<button class="btn btn-outline-secondary btn-sm" data-textalign="right" title="Text Right">R</button>
						<button class="btn btn-outline-secondary btn-sm bs-clear-value" title="Clear Value">Clear Value</button>
					</div>
				</div>
			</div>
			<button class="btn btn-xs btn-light bs-props-restore" id="bs-show-props" type="button">Show Properties</button>
		</div>

		<div class="bs-center-grid">
			<section class="bs-pane bs-design-pane">
				<div class="bs-pane-head">
					<div class="font-weight-bold">Design</div>
					<div class="bs-pane-meta">Actual sticker size in printer units</div>
				</div>
					<div id="bs-canvas-wrap" class="bb-stage bs-canvas-stage">
					<canvas id="bs-canvas"></canvas>
				</div>
			</section>

			<section class="bs-pane bs-preview-column">
				<div class="bs-pane-head">
					<div class="font-weight-bold">Preview</div>
					<div class="bs-pane-meta">1:1</div>
				</div>
				<div id="bs-preview-pane" class="bs-preview-surface">
					<div id="bs-preview"></div>
				</div>
			</section>
		</div>

		<div class="bs-status">
			<div id="bs-status-left">Snap: <span id="bs-snap-label">1mm</span></div>
			<div id="bs-status-right">W×H: <span id="bs-size-label"></span></div>
		</div>
	</div>

	<div class="bs-side bs-panel-props">
		<div class="bs-collapsible" id="bs-props-box">
			<div class="head">
				<div class="font-weight-bold">Properties</div>
				<div><button class="btn btn-xs btn-light" id="bs-toggle-props">Hide</button></div>
			</div>
			<div class="body">
				<div id="bs-props" class="small text-muted"><em>Select an object</em></div>
			</div>
		</div>
	</div>
</div>
